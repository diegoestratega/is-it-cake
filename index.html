<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is it Cake? Real or Fake</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(ellipse at top, #1a0a2e 0%, #0d0d0d 70%);
            color: #fff;
            text-align: center;
            min-height: 100vh;
            padding: 20px;
        }

        #top-bar {
            display: flex;
            justify-content: flex-end;
            max-width: 1200px;
            margin: 0 auto 10px auto;
        }

        #coin-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            border: 2px solid #f5c518;
            border-radius: 50px;
            padding: 8px 20px 8px 10px;
            font-size: 1.4rem;
            font-weight: 900;
            color: #f5c518;
            box-shadow: 0 0 15px rgba(245,197,24,0.3);
            transition: color 0.3s, border-color 0.3s;
            min-width: 160px;
        }

        #coin-display.bump { animation: coinBump 0.4s ease; }

        @keyframes coinBump {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        .coin-fly {
            position: fixed;
            font-size: 2rem;
            font-weight: 900;
            pointer-events: none;
            z-index: 9999;
            animation: flyUp 1.4s ease-out forwards;
        }

        @keyframes flyUp {
            0%   { opacity: 1;  transform: translateY(0)     scale(1);   }
            60%  { opacity: 1;  transform: translateY(-80px) scale(1.2); }
            100% { opacity: 0;  transform: translateY(-130px) scale(0.9);}
        }

        .coin-svg { width: 36px; height: 36px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); flex-shrink: 0; }

        #title-img {
            max-width: 340px;
            width: 90%;
            margin: 0 auto 8px auto;
            display: block;
            filter: drop-shadow(0 0 20px rgba(255,42,95,0.5));
        }

        .subtitle { font-size: 1rem; color: #888; margin-bottom: 30px; letter-spacing: 1px; }

        /* ── REVEAL BANNER ── */
        #reveal-banner {
            display: none;
            background: linear-gradient(135deg, #1a0a2e, #2a0a1e);
            border: 2px solid #ff2a5f;
            border-radius: 16px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 900;
            color: #ff2a5f;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 12px rgba(255,42,95,0.6);
            margin: 0 auto 20px auto;
            max-width: 600px;
            animation: bannerPulse 0.8s ease-in-out infinite alternate;
        }

        @keyframes bannerPulse {
            from { box-shadow: 0 0 10px rgba(255,42,95,0.3); }
            to   { box-shadow: 0 0 28px rgba(255,42,95,0.75); }
        }

        #game-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: 520px;
            flex-wrap: wrap;
        }

        /* ── CAKE CARDS ── */
        .cake-card {
            background: #1a1a1a;
            padding: 22px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 360px;
            border: 1px solid #2a2a2a;
            transition: transform 0.4s, box-shadow 0.4s, border-color 0.4s, opacity 0.4s;
            flex-shrink: 0;
        }

        .cake-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px rgba(0,229,255,0.15);
            border-color: #00e5ff55;
        }

        /* Fake card glows red during reveal — no dimming of real card */
        .cake-card.is-fake-revealed {
            border-color: #ff2a5f !important;
            box-shadow: 0 0 35px rgba(255,42,95,0.6) !important;
            transform: translateY(-6px) !important;
        }

        /* Real card stays fully visible — only border turns cyan to separate it */
        .cake-card.is-real-revealed {
            border-color: #00e5ff !important;
            box-shadow: 0 0 20px rgba(0,229,255,0.25) !important;
        }

        .trick-label {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            color: #00e5ff;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 12px rgba(0,229,255,0.5);
        }

        .fake-badge {
            display: none;
            background: #ff2a5f;
            color: white;
            font-size: 0.85rem;
            font-weight: 900;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            animation: badgePop 0.4s ease;
        }

        .real-badge {
            display: none;
            background: #00e5ff;
            color: #000;
            font-size: 0.85rem;
            font-weight: 900;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            animation: badgePop 0.4s ease;
        }

        @keyframes badgePop {
            0%   { transform: scale(0); }
            70%  { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* overflow:hidden clips circle to image area */
        .img-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 20px;
            border-radius: 14px;
            overflow: hidden;
        }

        .cake-image {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 14px;
            border: 3px solid #2a2a2a;
            background-color: #111;
            display: block;
        }

        .diff-circle {
            display: none;
            position: absolute;
            border: 2.5px solid #ff2a5f;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: ring-pulse 1s ease-out infinite;
            box-shadow: 0 0 10px 3px rgba(255,42,95,0.5);
        }

        @keyframes ring-pulse {
            0%   { box-shadow: 0 0 0 0    rgba(255,42,95,0.9), 0 0 10px 3px rgba(255,42,95,0.5); }
            70%  { box-shadow: 0 0 0 12px rgba(255,42,95,0),   0 0 10px 3px rgba(255,42,95,0.5); }
            100% { box-shadow: 0 0 0 0    rgba(255,42,95,0),   0 0 10px 3px rgba(255,42,95,0.5); }
        }

        .choose-btn {
            background: linear-gradient(135deg, #ff2a5f, #ff5e3a);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.25s ease;
        }

        .choose-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #ff003c, #ff4015);
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(255,42,95,0.4);
        }

        .choose-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── PRESENTER ── */
        #presenter-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        #presenter-img {
            width: 240px;
            border-radius: 20px;
            filter: drop-shadow(0 0 20px rgba(255,42,95,0.55));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        #presenter-speech {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 0.9rem;
            color: #ccc;
            max-width: 200px;
            line-height: 1.4;
            font-style: italic;
        }

        /* ── LOADING ── */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
        }

        .loading-emoji { font-size: 5rem; animation: bounce 1s infinite; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-15px); }
        }

        .loading-text    { font-size: 1.6rem; color: #00e5ff; font-weight: bold; }
        .loading-subtext { font-size: 0.9rem; color: #555; max-width: 400px; line-height: 1.6; }

        .progress-dots span {
            display: inline-block;
            width: 10px; height: 10px;
            background: #00e5ff;
            border-radius: 50%;
            margin: 0 4px;
            animation: pulse 1.2s infinite;
        }

        .progress-dots span:nth-child(2) { animation-delay: 0.2s; }
        .progress-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50%       { opacity: 1;   transform: scale(1.2); }
        }

        /* ── RESULT MODAL ── */
        #result-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.93);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            backdrop-filter: blur(8px);
            gap: 16px;
        }

        .result-emoji   { font-size: 5rem; }
        .result-message { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; line-height: 1.2; }
        .result-coins   { font-size: 2rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .result-subtext { font-size: 1.1rem; color: #aaa; }

        .correct { color: #00ff88; text-shadow: 0 0 25px rgba(0,255,136,0.6); }
        .wrong   { color: #ff2a5f; text-shadow: 0 0 25px rgba(255,42,95,0.6); }

        .next-btn {
            background: #00e5ff;
            color: #000;
            border: none;
            padding: 16px 55px;
            font-size: 1.4rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        .next-btn:hover {
            background: #00c8df;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,229,255,0.4);
        }

        .error-screen { color: #ff2a5f; font-size: 1.2rem; }
        .error-screen p { color: #666; font-size: 0.9rem; margin-top: 8px; }

        @media (max-width: 900px) {
            #presenter-wrap { order: -1; }
            #presenter-img  { width: 160px; }
            .img-wrapper, .cake-image { width: 260px; height: 260px; }
            .cake-card { width: 300px; }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div id="coin-display">
            <svg class="coin-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="coinGrad" cx="38%" cy="35%" r="60%">
                        <stop offset="0%"   stop-color="#fff176"/>
                        <stop offset="40%"  stop-color="#f5c518"/>
                        <stop offset="100%" stop-color="#b8860b"/>
                    </radialGradient>
                </defs>
                <circle cx="52" cy="54" r="44" fill="#7a5c00"/>
                <circle cx="50" cy="50" r="44" fill="#f5c518"/>
                <circle cx="50" cy="50" r="40" fill="url(#coinGrad)"/>
                <circle cx="50" cy="50" r="33" fill="none" stroke="#b8860b" stroke-width="2.5"/>
                <text x="50" y="58" text-anchor="middle" font-family="Georgia,serif"
                      font-size="34" font-weight="bold" fill="#7a5c00">$</text>
                <ellipse cx="36" cy="34" rx="10" ry="6"
                         fill="rgba(255,255,255,0.35)" transform="rotate(-30 36 34)"/>
            </svg>
            <span id="coin-count">0</span> coins
        </div>
    </div>

    <img src="title.jpg" alt="Is it Cake?" id="title-img">
    <p class="subtitle">One is real. One has a subtle AI difference. Can you spot it?</p>

    <div id="reveal-banner">🔍 Spot the difference! Red circle = AI-modified area</div>

    <div id="game-wrapper"></div>

    <div id="result-overlay">
        <div class="result-emoji"   id="result-emoji"></div>
        <div class="result-message" id="result-text"></div>
        <div class="result-coins"   id="result-coins"></div>
        <div class="result-subtext" id="result-subtext"></div>
        <button class="next-btn" onclick="nextRound()">Next Round 🎂</button>
    </div>

    <script>
        const BACKEND_URL = "http://127.0.0.1:3000";

        let coins         = 0;
        let buttonsLocked = false;
        let currentDiff   = null;
        let fakeCardEl    = null;
        let realCardEl    = null;
        let fakeCardImgEl = null;
        let fakeDiffEl    = null;
        let fakeBadgeEl   = null;
        let realBadgeEl   = null;

        // ── SOUNDS ──────────────────────────────────────────────────
        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (type === 'correct') {
                    [[523,0],[659,0.13],[784,0.26]].forEach(([freq, delay]) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.type = 'sine'; osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0, ctx.currentTime + delay);
                        gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + delay + 0.04);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.45);
                        osc.start(ctx.currentTime + delay);
                        osc.stop(ctx.currentTime + delay + 0.5);
                    });
                } else {
                    [[380,0],[300,0.22],[220,0.44]].forEach(([freq, delay]) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        const lfo = ctx.createOscillator();
                        const lfoGain = ctx.createGain();
                        lfo.frequency.value = 8; lfoGain.gain.value = 30;
                        lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.type = 'sawtooth'; osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.25, ctx.currentTime + delay);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.18);
                        lfo.start(ctx.currentTime + delay); lfo.stop(ctx.currentTime + delay + 0.2);
                        osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + 0.2);
                    });
                }
            } catch(e) {}
        }

        // ── ANIMATED COINS ───────────────────────────────────────────
        function animateCoins(fromVal, toVal) {
            const el = document.getElementById('coin-count');
            const duration = 900;
            const start = performance.now();
            const diff = toVal - fromVal;
            function step(now) {
                const t = Math.min((now - start) / duration, 1);
                const eased = 1 - Math.pow(1 - t, 3);
                el.innerText = Math.round(fromVal + diff * eased);
                if (t < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function spawnCoinFly(delta) {
            const display = document.getElementById('coin-display');
            const rect = display.getBoundingClientRect();
            const el = document.createElement('div');
            el.className = 'coin-fly';
            el.innerText = delta > 0 ? `+${delta} 🪙` : `${delta} 🪙`;
            el.style.color = delta > 0 ? '#f5c518' : '#ff2a5f';
            el.style.left = (rect.left + rect.width / 2 - 30) + 'px';
            el.style.top  = (rect.top - 10) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        function updateCoins(delta) {
            const from = coins;
            coins += delta;
            const display = document.getElementById('coin-display');
            display.classList.remove('bump'); void display.offsetWidth; display.classList.add('bump');
            const color = delta > 0 ? '#f5c518' : '#ff2a5f';
            display.style.color = color; display.style.borderColor = color;
            setTimeout(() => { display.style.color = '#f5c518'; display.style.borderColor = '#f5c518'; }, 700);
            animateCoins(from, coins);
            spawnCoinFly(delta);
        }

        // ── DIFF CIRCLE ──────────────────────────────────────────────
        function calcCirclePos(dispW, dispH, diff) {
            const scale = Math.max(dispW / diff.w, dispH / diff.h);
            const offX  = (diff.w * scale - dispW) / 2;
            const offY  = (diff.h * scale - dispH) / 2;
            const dx    = diff.cx * diff.w * scale - offX;
            const dy    = diff.cy * diff.h * scale - offY;
            const dr    = diff.r  * Math.min(diff.w, diff.h) * scale;
            return {
                x: Math.max(dr, Math.min(dispW - dr, dx)),
                y: Math.max(dr, Math.min(dispH - dr, dy)),
                r: dr
            };
        }

        function showDiffCircle(circleEl, pos) {
            const size = pos.r * 2;
            circleEl.style.left = pos.x + 'px'; circleEl.style.top = pos.y + 'px';
            circleEl.style.width = size + 'px'; circleEl.style.height = size + 'px';
            circleEl.style.display = 'block';
        }

        // ── PRESENTER ────────────────────────────────────────────────
        const PRESENTER_LINES = [
            "One has a subtle change... find it! 🔍",
            "Don't be fooled by the AI! 👀",
            "They look identical — but are they? 🎂",
            "Look very closely at both! 🧐",
            "The AI made ONE tiny change 🤖",
            "Trust your gut! 🍰",
            "One tiny detail is different 😏",
            "Study every inch of frosting! 🧁",
            "Both look VERY similar... 😅",
            "Spot the difference and win coins! 🪙",
        ];

        function buildPresenter(line) {
            const wrap = document.createElement('div');
            wrap.id = 'presenter-wrap';
            wrap.innerHTML = `
                <img src="presentador.jpg" alt="Presenter" id="presenter-img">
                <div id="presenter-speech">"${line}"</div>`;
            return wrap;
        }

        // ── INIT GAME ─────────────────────────────────────────────────
        async function initGame() {
            const board = document.getElementById('game-wrapper');
            buttonsLocked = false; currentDiff = null;
            fakeCardEl = null; realCardEl = null;
            fakeCardImgEl = null; fakeDiffEl = null;
            fakeBadgeEl = null; realBadgeEl = null;
            document.getElementById('reveal-banner').style.display = 'none';

            board.innerHTML = `
                <div class="loading-screen">
                    <div class="loading-emoji">🎂</div>
                    <div class="loading-text">Baking the cakes...</div>
                    <div class="loading-subtext">Preparing two almost-identical cakes with one tiny difference!</div>
                    <div class="progress-dots"><span></span><span></span><span></span></div>
                </div>`;

            try {
                const response = await fetch(`${BACKEND_URL}/api/get-cakes`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                currentDiff = data.diff;
                board.innerHTML = '';

                const isRealOnLeft = Math.random() > 0.5;
                const labels       = ["Real Cake", "Fake Cake"];
                const leftLabel    = labels[Math.floor(Math.random() * 2)];
                const rightLabel   = labels[Math.floor(Math.random() * 2)];

                board.appendChild(createCard(leftLabel,  isRealOnLeft ? data.real : data.fake,  isRealOnLeft, !isRealOnLeft));
                board.appendChild(buildPresenter(PRESENTER_LINES[Math.floor(Math.random() * PRESENTER_LINES.length)]));
                board.appendChild(createCard(rightLabel, isRealOnLeft ? data.fake : data.real, !isRealOnLeft,  isRealOnLeft));

            } catch (err) {
                board.innerHTML = `
                    <div class="error-screen">❌ Error loading cakes. Is your Python backend running?
                        <p>${err.message}</p>
                        <p style="margin-top:12px;">Run: <code style="color:#00e5ff;">uvicorn main:app --reload --port 3000</code></p>
                    </div>`;
            }
        }

        // ── CREATE CARD ───────────────────────────────────────────────
        function createCard(labelText, imageUrl, isReal, isFake) {
            const card = document.createElement('div');
            card.className = 'cake-card';

            const fakeBadge = document.createElement('div');
            fakeBadge.className = 'fake-badge';
            fakeBadge.innerText = '🤖 THIS IS THE FAKE!';

            const realBadge = document.createElement('div');
            realBadge.className = 'real-badge';
            realBadge.innerText = '✅ THIS IS REAL!';

            const label = document.createElement('div');
            label.className = 'trick-label';
            label.innerText = labelText;

            const wrapper = document.createElement('div');
            wrapper.className = 'img-wrapper';

            const img = document.createElement('img');
            img.className = 'cake-image';
            img.src = imageUrl; img.alt = 'mystery cake';
            img.onerror = () => {
                img.src = 'https://images.pexels.com/photos/1055272/pexels-photo-1055272.jpeg?auto=compress&cs=tinysrgb&w=800';
            };

            const circle = document.createElement('div');
            circle.className = 'diff-circle';

            wrapper.appendChild(img);
            wrapper.appendChild(circle);
            card.appendChild(fakeBadge);
            card.appendChild(realBadge);
            card.appendChild(label);
            card.appendChild(wrapper);

            const btn = document.createElement('button');
            btn.className = 'choose-btn';
            btn.innerText = '🎯 I Think This Is REAL!';
            btn.onclick = () => { if (!buttonsLocked) checkAnswer(isReal); };
            card.appendChild(btn);

            if (isFake) { fakeCardEl = card; fakeCardImgEl = img; fakeDiffEl = circle; fakeBadgeEl = fakeBadge; }
            else         { realCardEl = card; realBadgeEl = realBadge; }

            return card;
        }

        // ── CHECK ANSWER ──────────────────────────────────────────────
        function checkAnswer(isRealClicked) {
            buttonsLocked = true;
            document.querySelectorAll('.choose-btn').forEach(b => b.disabled = true);

            playSound(isRealClicked ? 'correct' : 'wrong');

            // Show reveal banner
            document.getElementById('reveal-banner').style.display = 'block';

            // Highlight fake card with red glow — real card gets cyan border only, NO dimming
            if (fakeCardEl) fakeCardEl.classList.add('is-fake-revealed');
            if (realCardEl) realCardEl.classList.add('is-real-revealed');

            // Show badges on BOTH cards
            if (fakeBadgeEl) fakeBadgeEl.style.display = 'block';
            if (realBadgeEl) realBadgeEl.style.display = 'block';

            // Draw diff circle on the fake cake
            if (fakeCardImgEl && fakeDiffEl && currentDiff) {
                const reveal = () => {
                    const pos = calcCirclePos(300, 300, currentDiff);
                    showDiffCircle(fakeDiffEl, pos);
                };
                if (fakeCardImgEl.complete) reveal();
                else fakeCardImgEl.onload = reveal;
            }

            // Show result modal after 5 seconds
            setTimeout(() => {
                document.getElementById('reveal-banner').style.display = 'none';

                const overlay = document.getElementById('result-overlay');
                const emoji   = document.getElementById('result-emoji');
                const text    = document.getElementById('result-text');
                const coinsEl = document.getElementById('result-coins');
                const subtext = document.getElementById('result-subtext');

                const COIN_SVG = `<svg width="28" height="28" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs><radialGradient id="cg3" cx="38%" cy="35%" r="60%">
                        <stop offset="0%" stop-color="#fff176"/>
                        <stop offset="40%" stop-color="#f5c518"/>
                        <stop offset="100%" stop-color="#b8860b"/>
                    </radialGradient></defs>
                    <circle cx="52" cy="54" r="44" fill="#7a5c00"/>
                    <circle cx="50" cy="50" r="40" fill="url(#cg3)"/>
                    <circle cx="50" cy="50" r="33" fill="none" stroke="#b8860b" stroke-width="2.5"/>
                    <text x="50" y="58" text-anchor="middle" font-family="Georgia,serif"
                          font-size="34" font-weight="bold" fill="#7a5c00">$</text>
                    <ellipse cx="36" cy="34" rx="10" ry="6"
                             fill="rgba(255,255,255,0.35)" transform="rotate(-30 36 34)"/>
                </svg>`;

                if (isRealClicked) {
                    updateCoins(10);
                    emoji.innerText = '🎉'; text.innerText = 'Correct!';
                    text.className = 'result-message correct';
                    coinsEl.innerHTML = `${COIN_SVG}<span style="color:#f5c518">+10 coins!</span>`;
                    subtext.innerText = 'Sharp eye — you spotted the real cake!';
                } else {
                    updateCoins(-10);
                    emoji.innerText = '😂'; text.innerText = 'Wrong!';
                    text.className = 'result-message wrong';
                    coinsEl.innerHTML = `${COIN_SVG}<span style="color:#ff2a5f">-10 coins!</span>`;
                    subtext.innerText = 'The AI fooled you! See the red circle for where it was.';
                }

                overlay.style.display = 'flex';
            }, 5000);
        }

        function nextRound() {
            document.getElementById('result-overlay').style.display = 'none';
            initGame();
        }

        window.onload = initGame;
    </script>
</body>
</html>
